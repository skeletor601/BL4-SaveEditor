<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BL4 Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: url('coming_soon.png') no-repeat center center;
      background-size: cover;
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
    }

    .text {
      position: relative;
      z-index: 2;
      font-size: 3rem;
      color: white;
      text-shadow: 0 0 20px #00ffff;
      letter-spacing: 4px;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>
  <div class="text">COMING SOON</div>
</body>
</html>
